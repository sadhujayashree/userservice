spring.application.name=UserService

# Log level: INFO only (DEBUG is hidden unless you raise logging.level for a package)
logging.level.root=INFO

# Log file path (relative to the process working directory, usually project root when running via IDE or ./mvnw spring-boot:run)
logging.file.name=logs/userservice.log

# Listen on all interfaces; port from PORT env when set (Railway/Heroku/Render/Fly) — avoids 502 when proxy expects a different fixed port without env.
server.address=0.0.0.0
server.port=${PORT:5000}

# Health for load balancer / platform probes — must return 200; lock down actuator otherwise
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://userservice-instance.czs2y4aqogqj.ap-south-1.rds.amazonaws.com:3306/userservice
spring.datasource.username=admin
spring.datasource.password=Scalar123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql= true

